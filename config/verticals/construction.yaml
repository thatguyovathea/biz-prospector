# Construction / General Contracting vertical
name: construction

weights:
  website_outdated: 15
  no_crm_detected: 15
  no_scheduling_tool: 15  # Project scheduling matters but less than service businesses
  no_chat_widget: 5
  manual_job_postings: 25  # Heavy manual labor signals = high automation opportunity
  negative_reviews_ops: 20
  business_age: 5

